<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Mixmax signature gradient: navy #242161 → magenta #D125E9 -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C51"/>
      <stop offset="55%" stop-color="#242161"/>
      <stop offset="100%" stop-color="#D125E9"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#g)"/>
  <!-- subtle chart spark in teal accent (Mixmax tertiary) -->
  <polyline points="8,44 20,36 28,40 38,26 50,30 58,18"
            fill="none" stroke="#00C9C5" stroke-opacity="0.40"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- RR wordmark (Inter-style 800) -->
  <text x="32" y="44" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-1.5">RR</text>
</svg>
